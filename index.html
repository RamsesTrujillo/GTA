<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor GTA Web - Cámara Libre</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: white; font-family: sans-serif; 
            background: rgba(0,0,0,0.6); padding: 15px; 
            border-radius: 8px; pointer-events: none;
        }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #111;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; font-family: sans-serif; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading-screen">Cargando modelo humano... (Buscando ./personaje.glb)</div>
    <div id="ui">
        <b>Controles:</b><br><br>
        [W, A, S, D] - Mover al personaje<br>
        [Click Izquierdo + Arrastrar] - Rotar la cámara<br>
        [Rueda del Ratón] - Acercar / Alejar
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        // Importamos los controles de órbita para manejar el ratón
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, player, clock, controls;
        const keys = { w: false, a: false, s: false, d: false };
        const playerSpeed = 0.1;
        const loadingScreen = document.getElementById('loading-screen');

        // Vectores auxiliares para el cálculo de movimiento direccional
        const walkDirection = new THREE.Vector3();
        const rotateAngle = new THREE.Vector3(0, 1, 0);
        const rotateQuarternion = new THREE.Quaternion();
        const cameraTarget = new THREE.Vector3();

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Cielo azul
            scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Sistema de Cámara Libre (Ratón)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false; // Bloqueamos el paneo para que siempre siga al jugador
            controls.minDistance = 2;   // Zoom máximo
            controls.maxDistance = 10;  // Zoom mínimo
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Evita que la cámara pase por debajo del suelo

            // Iluminación
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(5, 15, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            scene.add(dirLight);

            // Suelo
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshPhongMaterial({ color: 0x555555, depthWrite: false })
            );
            mesh.rotation.x = - Math.PI / 2;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const grid = new THREE.GridHelper(200, 200, 0x000000, 0x000000);
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            // Cargador del modelo (Ruta relativa directa para GitHub Pages)
            const loader = new GLTFLoader();
            loader.load('./personaje.glb', function (gltf) {
                player = gltf.scene;
                
                player.traverse(function (object) {
                    if (object.isMesh) object.castShadow = true;
                });

                // Posición inicial de la cámara relativa al personaje
                camera.position.set(0, 3, 6);
                scene.add(player);
                
                loadingScreen.style.display = 'none';
                animate(); 

            }, undefined, function (error) {
                console.error(error);
                loadingScreen.innerHTML = "Error: No se pudo cargar './personaje.glb'.";
            });

            // Controles de teclado
            window.addEventListener('keydown', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; });
            window.addEventListener('keyup', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; });
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Obtiene la dirección hacia la que mira la cámara en el plano horizontal (X, Z)
        function getForwardVector() {
            camera.getWorldDirection(walkDirection);
            walkDirection.y = 0;
            walkDirection.normalize();
            return walkDirection;
        }

        // Obtiene la dirección lateral a la cámara
        function getSideVector() {
            camera.getWorldDirection(walkDirection);
            walkDirection.y = 0;
            walkDirection.normalize();
            walkDirection.cross(camera.up);
            return walkDirection;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (player) {
                let moveX = 0;
                let moveZ = 0;

                if (keys.w) moveZ = 1; // Adelante
                if (keys.s) moveZ = -1; // Atrás
                if (keys.a) moveX = -1; // Izquierda
                if (keys.d) moveX = 1; // Derecha

                if (moveX !== 0 || moveZ !== 0) {
                    // Calculamos los vectores de dirección relativos a la cámara
                    const forward = getForwardVector().multiplyScalar(moveZ);
                    const right = getSideVector().multiplyScalar(moveX);
                    
                    // Combinamos los vectores para obtener la dirección final
                    const direction = new THREE.Vector3().addVectors(forward, right).normalize();

                    // Aplicamos el movimiento al personaje
                    player.position.add(direction.multiplyScalar(playerSpeed));

                    // Rotamos el cuerpo del personaje para que mire hacia donde camina
                    const angle = Math.atan2(direction.x, direction.z);
                    rotateQuarternion.setFromAxisAngle(rotateAngle, angle);
                    player.quaternion.rotateTowards(rotateQuarternion, 0.2); // Rotación suave
                }

                // El objetivo de la cámara sigue al jugador (apuntando al pecho/cabeza)
                cameraTarget.set(player.position.x, player.position.y + 1.5, player.position.z);
                controls.target.copy(cameraTarget);
                controls.update(); // Necesario llamar en cada frame cuando se mueve el target
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
