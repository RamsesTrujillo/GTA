<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor GTA Web - FPS Minimalista</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: white; font-family: sans-serif; 
            background: rgba(0,0,0,0.6); padding: 15px; 
            border-radius: 8px; pointer-events: none;
        }
        /* Nuevo estilo minimalista para los FPS */
        #fps-counter {
            position: absolute; top: 20px; right: 20px;
            background: rgba(128, 128, 128, 0.5); /* Gris semitransparente */
            color: white; font-family: sans-serif; font-weight: bold;
            padding: 5px 10px; border-radius: 4px; pointer-events: none;
        }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #111;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; font-family: sans-serif; z-index: 100;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen">Cargando modelo humano... (Buscando ./personaje.glb)</div>
    
    <div id="ui">
        <b>Controles:</b><br><br>
        [W, A, S, D] - Mover al personaje<br>
        [Click Izquierdo + Arrastrar] - Rotar la cámara<br>
        [Rueda del Ratón] - Acercar / Alejar
    </div>

    <div id="fps-counter">0 FPS</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, player, clock, controls;
        const keys = { w: false, a: false, s: false, d: false };
        const playerSpeed = 0.1;
        const loadingScreen = document.getElementById('loading-screen');

        // Variables para el contador de FPS personalizado
        let frames = 0;
        let prevTime = performance.now();
        const fpsElement = document.getElementById('fps-counter');

        const cameraDirection = new THREE.Vector3();
        const forwardVector = new THREE.Vector3();
        const sideVector = new THREE.Vector3();
        
        const rotateAngle = new THREE.Vector3(0, 1, 0);
        const rotateQuarternion = new THREE.Quaternion();
        const cameraTarget = new THREE.Vector3();

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.minDistance = 2;
            controls.maxDistance = 10;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(5, 15, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            scene.add(dirLight);

            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshPhongMaterial({ color: 0x555555, depthWrite: false })
            );
            mesh.rotation.x = - Math.PI / 2;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const grid = new THREE.GridHelper(200, 200, 0x000000, 0x000000);
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            const loader = new GLTFLoader();
            loader.load('./personaje.glb', function (gltf) {
                player = gltf.scene;
                
                player.traverse(function (object) {
                    if (object.isMesh) object.castShadow = true;
                });

                camera.position.set(0, 3, 6);
                scene.add(player);
                
                loadingScreen.style.display = 'none';
                animate(); 

            }, undefined, function (error) {
                console.error(error);
                loadingScreen.innerHTML = "Error: No se pudo cargar './personaje.glb'.";
            });

            window.addEventListener('keydown', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; });
            window.addEventListener('keyup', (e) => { const key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; });
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // --- LÓGICA DEL CONTADOR DE FPS ---
            frames++;
            const time = performance.now();
            // Actualizamos el texto cada 1000 milisegundos (1 segundo)
            if (time >= prevTime + 1000) {
                fpsElement.textContent = Math.round((frames * 1000) / (time - prevTime)) + ' FPS';
                prevTime = time;
                frames = 0;
            }
            // ----------------------------------

            if (player) {
                let moveX = 0;
                let moveZ = 0;

                if (keys.w) moveZ = 1;
                if (keys.s) moveZ = -1;
                if (keys.a) moveX = -1;
                if (keys.d) moveX = 1;

                if (moveX !== 0 || moveZ !== 0) {
                    camera.getWorldDirection(cameraDirection);
                    cameraDirection.y = 0;
                    cameraDirection.normalize();

                    forwardVector.copy(cameraDirection).multiplyScalar(moveZ);
                    sideVector.copy(cameraDirection).cross(camera.up).multiplyScalar(moveX);
                    
                    const direction = new THREE.Vector3().addVectors(forwardVector, sideVector).normalize();

                    player.position.add(direction.multiplyScalar(playerSpeed));

                    const angle = Math.atan2(direction.x, direction.z);
                    rotateQuarternion.setFromAxisAngle(rotateAngle, angle);
                    player.quaternion.rotateTowards(rotateQuarternion, 0.2);
                }

                cameraTarget.set(player.position.x, player.position.y + 1.5, player.position.z);
                controls.target.copy(cameraTarget);
                controls.update();
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
